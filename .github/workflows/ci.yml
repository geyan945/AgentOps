name: agentops-ci

on:
  push:
    paths:
      - "agentops-app/**"
      - "agentops-runtime-py/**"
      - "agentops-web/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "agentops-app/**"
      - "agentops-runtime-py/**"
      - "agentops-web/**"
      - ".github/workflows/ci.yml"

jobs:
  java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgentOps/agentops-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
      - uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-m2-${{ hashFiles('AgentOps/agentops-app/pom.xml') }}
      - name: Java compile and test
        run: ./mvnw -q test

  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgentOps/agentops-runtime-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Pytest
        run: pytest -q tests

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: AgentOps/agentops-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: AgentOps/agentops-web/package-lock.json
      - name: Install deps
        run: npm ci
      - name: Build
        run: npm run build
