server:
  port: ${AGENTOPS_APP_PORT:18084}

spring:
  application:
    name: agentops-app
  datasource:
    url: ${AGENTOPS_DB_URL:jdbc:mysql://localhost:3406/agentops?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${AGENTOPS_DB_USERNAME:root}
    password: ${AGENTOPS_DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  data:
    redis:
      host: ${AGENTOPS_REDIS_HOST:localhost}
      port: ${AGENTOPS_REDIS_PORT:16379}
      password: ${AGENTOPS_REDIS_PASSWORD:}
      timeout: 3000ms
      repositories:
        enabled: false
  rabbitmq:
    host: ${AGENTOPS_RABBITMQ_HOST:localhost}
    port: ${AGENTOPS_RABBITMQ_PORT:5672}
    username: ${AGENTOPS_RABBITMQ_USERNAME:guest}
    password: ${AGENTOPS_RABBITMQ_PASSWORD:guest}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${AGENTOPS_JWT_SECRET:change-me-in-env-before-prod}
  expire-seconds: ${AGENTOPS_JWT_EXPIRE_SECONDS:86400}

agent:
  internal:
    api-key: ${AGENTOPS_INTERNAL_KEY:change-me-in-env-before-prod}
  planner:
    provider: rule
    prompt-version: planner-v1
  answer:
    provider: rule
    prompt-version: answer-v1
  runtime:
    base-url: ${AGENTOPS_RUNTIME_BASE_URL:http://localhost:18085}
    default-graph-name: enterprise-copilot
    default-graph-version: v2
  max-tool-calls: 2
  max-steps: 4
  rate-limit:
    enabled: true
    run-per-minute: 20
    eval-per-minute: 3
  cache:
    tool:
      enabled: true
    kb-search-ttl-seconds: 300
    doc-fetch-ttl-seconds: 600
    sql-query-ttl-seconds: 60
    session-summary-ttl-seconds: 600
    session-summary-max-messages: 8
  eval:
    pass-score: 0.6
  kb:
    default-knowledge-base-id: 1
    es:
      enabled: true
      base-url: ${AGENTOPS_ES_BASE_URL:http://localhost:19200}
      index-name: qa_document_chunks
  mcp:
    enabled: true
    base-url: ${AGENTOPS_MCP_BASE_URL:http://localhost:18084/internal/mcp}
    prefer-remote-tools: false

gemini:
  base-url: https://generativelanguage.googleapis.com
  api-key: ${GEMINI_API_KEY:}
  chat-model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
